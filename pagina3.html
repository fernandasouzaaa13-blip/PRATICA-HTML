<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <!-- Permite usar acentos -->
    <meta charset="UTF-8">

    <!-- Responsividade -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Conecta o CSS -->
    <link rel="stylesheet" href="pagina3.css">

    <!-- Título da aba -->
    <title>Cadastro de Cliente</title>

</head>

<body>

    <!-- Card principal -->
    <div class="card">

        <!-- Título da página -->
        <h1>Cadastro de Cliente</h1>

        <!-- Texto explicativo -->
        <p>Preencha todos os campos abaixo</p>

        <!-- Dica -->
        <p class="dica">
            DICA: Use type="email" e type="tel" para validação automática.
        </p>

        <!-- Formulário -->
        <form>

            <!-- Nome completo -->
            <label>Nome Completo</label>
            <input type="text" placeholder="Ex: Maria Silva">

            <!-- CPF -->
            <label>CPF</label>
            <input type="text" placeholder="000.000.000-00">

            <!-- Data de nascimento -->
            <label>Data de Nascimento</label>
            <input type="date">

            <!-- Email -->
            <label>E-mail</label>
            <input type="email" placeholder="Ex: maria@email.com">

            <!-- Telefone -->
            <label>Telefone / WhatsApp</label>
            <input type="tel" placeholder="(11)99999-0000">

            <!-- Cidade -->
            <label>Cidade</label>
            <input type="text" placeholder="Ex: São Paulo">

            <!-- Botão -->
            <button>Cadastrar Cliente</button>

        </form>

        <!-- Voltar ao menu -->
        <a class="voltar" href="pagina1.html">
            Voltar para o menu principal
        </a>

    </div>

</body>

</html>
