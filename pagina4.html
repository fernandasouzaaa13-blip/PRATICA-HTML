<title>Cadastro de Fornecedor</title>

</head>

<body>

<div class="card">

<h1>Cadastro de Fornecedor</h1>

<p>Preencha todos os campos abaixo</p>

<p class="dica">
DICA: O atributo maxlength limita caracteres digitados.
</p>

<form>

<label>Razão Social</label>
<input type="text" placeholder="Ex: Tech Distribuidora Ltda">

<label>CNPJ</label>
<input type="text" placeholder="00.000.000/0001-00">

<label>Telefone</label>
<input type="tel" placeholder="(11)3000-0000">

<label>E-mail Comercial</label>
<input type="email" placeholder="contato@empresa.com">

<label>Nome do Responsável</label>
<input type="text" placeholder="Ex: João da Silva">

<label>Tipo de Fornecimento</label>
<input type="text" placeholder="O que a empresa fornece?">

<button>Cadastrar Fornecedor</button>

</form>

Voltar para o menu principal
</a>

</div>
