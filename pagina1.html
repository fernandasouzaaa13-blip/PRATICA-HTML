<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <!-- Define o padrão de caracteres (permite usar acentos) -->
    <meta charset="UTF-8">

    <!-- Faz o site se adaptar a celulares e telas menores -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Conecta o arquivo de estilo CSS -->
    <link rel="stylesheet" href="pagina1.css">

    <!-- Título da aba do navegador -->
    <title>Sistema de Cadastro</title>

</head>

<body>

    <!-- Container principal que representa o card vermelho -->
    <div class="card">

        <!-- Título principal do sistema -->
        <h1>SISTEMA DE CADASTRO</h1>

        <!-- Pequena descrição abaixo do título -->
        <p class="descricao">
            Aula de HTML e CSS - escolha uma opção para cadastrar
        </p>

        <!-- Botão que leva para a página de cadastro de produto -->
        <a class="botao" href="pagina2.html">
            Cadastro de Produto
            <span>Nome, preços, categoria e mais</span>
        </a>

        <!-- Botão que leva para a página de cadastro de cliente -->
        <a class="botao" href="pagina3.html">
            Cadastro de Cliente
            <span>Nome, CPF, telefone e mais</span>
        </a>

        <!-- Botão que leva para a página de cadastro de fornecedor -->
        <a class="botao" href="pagina4.html">
            Cadastro de Fornecedor
            <span>Empresa, CNPJ, contato e mais</span>
        </a>

    </div>

</body>

</html>
